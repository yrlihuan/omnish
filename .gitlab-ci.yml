stages:
  - check
  - test
  - build
  - release

variables:
  CARGO_HOME: ${CI_PROJECT_DIR}/.cargo

# Cache compiled dependencies between jobs
cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - .cargo/registry
    - .cargo/git
    - target/

check:
  stage: check
  image: docker.nv/ubuntu_2404_runner:latest
  script:
    - cargo check --workspace
    - cargo clippy --workspace
  allow_failure: false

test:
  stage: test
  image: docker.nv/ubuntu_2404_runner:latest
  script:
    - cargo test --workspace

build-release:
  stage: build
  image: docker.nv/ubuntu_2404_runner:latest
  variables:
    CC_x86_64_unknown_linux_musl: musl-gcc
  script:
    - cargo build --release --target x86_64-unknown-linux-musl
    - cp target/x86_64-unknown-linux-musl/release/omnish-client .
    - cp target/x86_64-unknown-linux-musl/release/omnish-daemon .
  artifacts:
    paths:
      - omnish-client
      - omnish-daemon
    expire_in: 30 days
  only:
    - tags

release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - job: build-release
      artifacts: true
  script:
    - echo "Creating release for ${CI_COMMIT_TAG}"
  release:
    tag_name: ${CI_COMMIT_TAG}
    name: "omnish ${CI_COMMIT_TAG}"
    description: "Release ${CI_COMMIT_TAG}"
    assets:
      links:
        - name: "omnish-client (linux-x86_64-static)"
          url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/omnish-client?job=build-release"
          filepath: "/omnish-client"
        - name: "omnish-daemon (linux-x86_64-static)"
          url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/omnish-daemon?job=build-release"
          filepath: "/omnish-daemon"
  only:
    - tags
