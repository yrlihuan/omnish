stages:
  - test
  - build
  - release

variables:
  CARGO_HOME: ${CI_PROJECT_DIR}/.cargo

# Cache compiled dependencies between jobs
cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - .cargo/registry
    - .cargo/git
    - target/

test:
  stage: test
  image: docker.nv/ubuntu_2404_runner:latest
  script:
    - cargo check --workspace
    - cargo clippy --workspace --all-targets --all-features -- -D warnings
    - cargo test --workspace
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - when: always

integration-test:
  stage: test
  image: docker.nv/ubuntu_2404_runner:latest
  script:
    - apt-get update -qq && apt-get install -y -qq tmux locales >/dev/null 2>&1
    - locale-gen en_US.UTF-8
    - export LANG=en_US.UTF-8 LC_ALL=en_US.UTF-8
    - cargo build --release
    # Setup omnish environment
    - mkdir -p ~/.omnish
    - echo "$DAEMON_TOML" > ~/.omnish/daemon.toml
    - mkdir -p ~/.omnish/bin
    - cp target/release/omnish-plugin ~/.omnish/bin/
    - cp -r plugins/ ~/.omnish/plugins/
    - ./target/release/omnish-daemon --init
    # Start daemon in background and wait for socket
    # OMNISH_SOCKET overrides listen_addr from daemon.toml (~ is not expanded by Rust)
    - export OMNISH_SOCKET="$HOME/.omnish/omnish.sock"
    - ./target/release/omnish-daemon &
    - |
      for i in $(seq 1 10); do
        [ -S "$OMNISH_SOCKET" ] && break
        sleep 1
      done
    # Populate chat threads for a more realistic test environment
    - bash tools/integration_tests/prepare_threads.sh
    # Run integration tests
    - bash tools/integration_tests/test_basic.sh
    - bash tools/integration_tests/test_tool_display.sh
    - bash tools/integration_tests/test_spinner.sh
    # Issue verification tests
    - bash tools/integration_tests/verify_issue_127.sh
    - bash tools/integration_tests/verify_issue_144.sh
    - bash tools/integration_tests/verify_issue_147.sh
    - bash tools/integration_tests/verify_issue_149.sh
    - bash tools/integration_tests/verify_issue_286.sh
    - bash tools/integration_tests/verify_issue_288.sh
    - bash tools/integration_tests/verify_issue_354.sh
    - bash tools/integration_tests/verify_resume_shortcut.sh
    - bash tools/integration_tests/verify_scroll_view.sh
    - bash tools/integration_tests/test_menu.sh
    - bash tools/integration_tests/verify_issue_180.sh
    - bash tools/integration_tests/verify_issue_184.sh
    - bash tools/integration_tests/verify_issue_337.sh
    - bash tools/integration_tests/verify_issue_342.sh
    - bash tools/integration_tests/verify_picker_selection.sh
    - bash tools/integration_tests/test_config_push.sh
    - bash tools/integration_tests/test_sandbox_rules.sh
  after_script:
    - kill $(pgrep -f omnish-daemon) 2>/dev/null || true
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"

build-release:
  stage: build
  image: docker.nv/ubuntu_2404_runner:latest
  variables:
    CC_x86_64_unknown_linux_musl: musl-gcc
  cache:
    key: ${CI_COMMIT_REF_SLUG}-musl
    paths:
      - .cargo/registry
      - .cargo/git
      - target/
  script:
    - cargo build --release --target x86_64-unknown-linux-musl
    - VERSION=$(cargo metadata --no-deps --format-version 1 | python3 -c "import sys,json; print(json.load(sys.stdin)['packages'][0]['version'])")
    - bash scripts/build-tar.sh "$VERSION" target/x86_64-unknown-linux-musl/release
    - echo "VERSION=$VERSION" > build.env
    - mkdir -p dist-compat
    - cp target/x86_64-unknown-linux-musl/release/omnish dist-compat/
    - cp target/x86_64-unknown-linux-musl/release/omnish-daemon dist-compat/
    - cp target/x86_64-unknown-linux-musl/release/omnish-plugin dist-compat/
  artifacts:
    paths:
      - dist/*.tar.gz
      - dist-compat/omnish
      - dist-compat/omnish-daemon
      - dist-compat/omnish-plugin
    reports:
      dotenv: build.env
    expire_in: 30 days
  rules:
    - if: $CI_COMMIT_TAG

release:
  stage: release
  image: docker.nv/ubuntu_2404_runner:latest
  needs:
    - job: build-release
      artifacts: true
  script:
    - echo "Creating release for ${CI_COMMIT_TAG} (version ${VERSION})"
    - |
      # Extract changelog for this release
      TAG_VERSION="${CI_COMMIT_TAG#v}"
      awk "/^## v${TAG_VERSION} /{found=1; next} /^## v/{found=0} found" CHANGELOG.md > release-notes.md
      echo "Release notes extracted:"
      cat release-notes.md
    - |
      release-cli create \
        --tag-name "${CI_COMMIT_TAG}" \
        --name "omnish ${CI_COMMIT_TAG}" \
        --description "$(cat release-notes.md)" \
        --assets-link "{\"name\":\"omnish-linux-x86_64.tar.gz\",\"url\":\"${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/dist/omnish-${VERSION}-linux-x86_64.tar.gz?job=build-release\",\"direct_asset_path\":\"/omnish-linux-x86_64.tar.gz\"}" \
        --assets-link "{\"name\":\"omnish (linux-x86_64-static)\",\"url\":\"${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/dist-compat/omnish?job=build-release\",\"direct_asset_path\":\"/omnish\"}" \
        --assets-link "{\"name\":\"omnish-daemon (linux-x86_64-static)\",\"url\":\"${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/dist-compat/omnish-daemon?job=build-release\",\"direct_asset_path\":\"/omnish-daemon\"}" \
        --assets-link "{\"name\":\"omnish-plugin (linux-x86_64-static)\",\"url\":\"${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/dist-compat/omnish-plugin?job=build-release\",\"direct_asset_path\":\"/omnish-plugin\"}"
  rules:
    - if: $CI_COMMIT_TAG
