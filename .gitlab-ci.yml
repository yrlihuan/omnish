stages:
  - check
  - test
  - build
  - release

variables:
  CARGO_HOME: ${CI_PROJECT_DIR}/.cargo

# Cache compiled dependencies between jobs
cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - .cargo/registry
    - .cargo/git
    - target/

check:
  stage: check
  image: docker.nv/ubuntu_2404_runner:latest
  script:
    - cargo check --workspace
    - cargo clippy --workspace
  allow_failure: false

test:
  stage: test
  image: docker.nv/ubuntu_2404_runner:latest
  needs: [check]
  script:
    - cargo test --workspace

build-release:
  stage: build
  image: docker.nv/ubuntu_2404_runner:latest
  variables:
    CC_x86_64_unknown_linux_musl: musl-gcc
  cache:
    key: ${CI_COMMIT_REF_SLUG}-musl
    paths:
      - .cargo/registry
      - .cargo/git
      - target/
  script:
    - cargo build --release --target x86_64-unknown-linux-musl
    - mkdir -p dist
    - cp target/x86_64-unknown-linux-musl/release/omnish-client dist/
    - cp target/x86_64-unknown-linux-musl/release/omnish-daemon dist/
    - cp target/x86_64-unknown-linux-musl/release/omnish-plugin dist/
  artifacts:
    paths:
      - dist/omnish-client
      - dist/omnish-daemon
      - dist/omnish-plugin
    expire_in: 30 days
  rules:
    - if: $CI_COMMIT_TAG

release:
  stage: release
  image: docker.nv/ubuntu_2404_runner:latest
  needs:
    - job: build-release
      artifacts: true
  script:
    - echo "Creating release for ${CI_COMMIT_TAG}"
  release:
    tag_name: ${CI_COMMIT_TAG}
    name: "omnish ${CI_COMMIT_TAG}"
    description: "Release ${CI_COMMIT_TAG}"
    assets:
      links:
        - name: "omnish-client (linux-x86_64-static)"
          url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/dist/omnish-client?job=build-release"
          filepath: "/omnish-client"
        - name: "omnish-daemon (linux-x86_64-static)"
          url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/dist/omnish-daemon?job=build-release"
          filepath: "/omnish-daemon"
        - name: "omnish-plugin (linux-x86_64-static)"
          url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/dist/omnish-plugin?job=build-release"
          filepath: "/omnish-plugin"
  rules:
    - if: $CI_COMMIT_TAG
