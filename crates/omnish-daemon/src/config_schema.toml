# Config schema: maps menu items to daemon.toml keys.
# Embedded via include_str!() — changes require recompilation.
#
# Fields:
#   path         — dot-separated menu hierarchy (e.g., "proxy.http_proxy")
#   label        — display name in menu
#   kind         — text | select | toggle | submenu | dynamic
#   toml_key     — actual daemon.toml key path (leaf items without handler)
#   options_from — (select) TOML table whose keys become options at runtime
#   options      — (select) static option list
#   handler      — (submenu) Rust function name for grouped change handling
#   default      — fallback value when toml_key is absent from config
#   source       — (dynamic) marker identifying which dynamic items to expand
#                  at this position. Known sources: "plugins"

# ── General > Hotkeys ─────────────────────────────────
[[items]]
path = "general.hotkeys.command_prefix"
label = "Enter chat mode"
kind = "text"
toml_key = "client.command_prefix"

[[items]]
path = "general.hotkeys.resume_prefix"
label = "Resume chat"
kind = "text"
toml_key = "client.resume_prefix"

# ── General > Language ─────────────────────────────────
[[items]]
path = "general.language"
label = "Language"
kind = "select"
toml_key = "client.language"
options = ["en", "zh", "zh-tw", "ja", "ko", "fr", "es", "ar"]

# ── General > Completion ──────────────────────────────
[[items]]
path = "general.shell_completion"
label = "Completion"
kind = "submenu"

[[items]]
path = "general.shell_completion.completion_enabled"
label = "Completion enabled"
kind = "toggle"
toml_key = "client.completion_enabled"

[[items]]
path = "general.shell_completion.ghost_timeout_ms"
label = "Ghost text timeout (ms)"
kind = "text"
toml_key = "client.ghost_timeout_ms"

# ── General > Auto Update ────────────────────────────
[[items]]
path = "general.auto_update.enabled"
label = "Enabled"
kind = "toggle"
toml_key = "tasks.auto_update.enabled"

[[items]]
path = "general.auto_update.check_url"
label = "Check URL"
kind = "text"
toml_key = "tasks.auto_update.check_url"

[[items]]
path = "general.auto_update.schedule"
label = "Schedule"
kind = "text"
toml_key = "tasks.auto_update.schedule"

# ── General > Proxy ──────────────────────────────────
[[items]]
path = "general.proxy.http_proxy"
label = "HTTP proxy"
kind = "text"
toml_key = "proxy.http_proxy"

[[items]]
path = "general.proxy.no_proxy"
label = "No proxy"
kind = "text"
toml_key = "proxy.no_proxy"

# ── LLM ───────────────────────────────────────────────
[[items]]
path = "llm"
label = "LLM"
kind = "submenu"

[[items]]
path = "llm.use_cases.completion"
label = "Completion backend"
kind = "select"
toml_key = "llm.use_cases.completion"
options_from = "llm.backends"

[[items]]
path = "llm.use_cases.analysis"
label = "Analysis backend"
kind = "select"
toml_key = "llm.use_cases.analysis"
options_from = "llm.backends"

[[items]]
path = "llm.use_cases.chat"
label = "Chat backend"
kind = "select"
toml_key = "llm.use_cases.chat"
options_from = "llm.backends"

[[items]]
path = "llm.use_cases.summarize"
label = "Summarize backend"
kind = "select"
toml_key = "llm.use_cases.summarize"
options_from = "llm.backends"

# ── Add new LLM backend ───────────────────────────────
# handler on submenu node: all child changes are grouped
# and passed to the handler function on ESC back
[[items]]
path = "llm.backends.__new__"
label = "Add backend"
kind = "submenu"
handler = "add_backend"

[[items]]
path = "llm.backends.__new__.provider"
label = "Provider"
kind = "select"

[[items]]
path = "llm.backends.__new__.name"
label = "Name"
kind = "text"

[[items]]
path = "llm.backends.__new__.backend_type"
label = "Backend type"
kind = "select"
options = ["anthropic", "openai-compat"]

[[items]]
path = "llm.backends.__new__.model"
label = "Model"
kind = "text"

[[items]]
path = "llm.backends.__new__.api_key"
label = "API key"
kind = "text"

[[items]]
path = "llm.backends.__new__.base_url"
label = "Base URL"
kind = "text"

[[items]]
path = "llm.backends.__new__.use_proxy"
label = "Use proxy"
kind = "toggle"

[[items]]
path = "llm.backends.__new__.context_window"
label = "Context window"
kind = "text"

# ── Tasks ────────────────────────────────────────────
[[items]]
path = "tasks.hourly_summary.enabled"
label = "Enabled"
kind = "toggle"
toml_key = "tasks.hourly_summary.enabled"

[[items]]
path = "tasks.daily_summary.enabled"
label = "Enabled"
kind = "toggle"
toml_key = "tasks.daily_notes.enabled"

# ── Plugins (dynamic: expanded from plugin metadata at runtime) ──
[[items]]
path = "plugins"
label = "Plugins"
kind = "dynamic"
source = "plugins"

# ── Sandbox ──────────────────────────────────────────
# Sandbox settings are entirely client-local (per-host).
# The submenu is daemon-side for structure, but its contents come from
# client-side placeholder expansion reading ClientConfig.sandbox.
[[items]]
path = "sandbox"
label = "Sandbox"
kind = "submenu"

# Client-side placeholder: expands to Toggle (enabled) + Select (backend)
# bound to ClientConfig.sandbox. Changes write directly to client.toml
# under keys "sandbox.enabled" and "sandbox.backend" (item paths are
# sandbox.__enabled / sandbox.__backend in the menu tree).
[[items]]
path = "sandbox._config"
label = "_client:sandbox_config"
kind = "label"

# Client-side placeholder: client detects local sandbox availability
# and replaces this label with colored status lines.
[[items]]
path = "sandbox._availability"
label = "_client:sandbox_availability"
kind = "label"

# Client-side placeholder: expands to the Rules submenu containing
# global rules (from daemon.toml) merged with local rules (from client.toml),
# plus an "Add permit rule" form. The daemon injects a sandbox.__rules_json
# data item immediately before this placeholder so the client can read it.
[[items]]
path = "sandbox._rules"
label = "_client:sandbox_rules"
kind = "label"
